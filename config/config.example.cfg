%% ali 应用配置文件（LLM + Agent）
%% 复制为 config.cfg 并填入 api_key

{provider, deepseek}.
{api_key, "your-api-key-here"}.
{base_url, "https://api.deepseek.com"}.
{model, "deepseek-v4-flash"}.
{projectRoot, "."}.
{maxSteps, 25}.
{maxMessages, 40}.
{maxTokens, 32000}.
{modelOptions, [{temperature, 0.2}]}.
{policy, [
    {allowRead, true},
    {allowExecuteSafe, true},
    {allowExecuteRisky, false},
    {allowWrite, false},
    {requireWriteConfirmation, true},
    {requireRiskyConfirmation, true}
]}.
{mode, ask}.
{backupBeforeEdit, true}.
{execBlacklist, [{os, cmd, 1}]}.
{execTimeout, 60000}.
{webPort, 8088}.
{webEnabled, false}.
%% Web API 访问令牌；留空表示不启用认证（仅本地开发建议使用）
{webApiToken, ""}.
