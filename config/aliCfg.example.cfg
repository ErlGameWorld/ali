%%=============================================================================
%% ali 应用配置文件（Erlang term 格式）
%%
%% 用法：复制为 aliCfg.cfg 或 config/aliCfg.cfg 并修改；启动时由 alConfig:load/0 加载。
%%
%% 配置分层（与 include/ 的关系）：
%%   aliCfg.cfg     — 用户可改的运行时参数（本文件）；字符串请用 UTF-8 binary
%%   include/*.hrl  — 编译期默认值 + 静态白名单（如附件扩展名、MIME）
%%
%% 读取方式：
%%   后端 — load/0 先将本文件与代码默认配置合并，再编译为 aliCfg；
%%          limits 经 alConfig:get/1 读取（未声明项已含 include/al_limits.hrl 默认值）
%%   前端 — GET / 注入 #ali-config JSON；/api/status 的 config 字段可刷新
%%=============================================================================

%%-----------------------------------------------------------------------------
%% LLM 连接
%%-----------------------------------------------------------------------------

%% 字符串类配置请写 UTF-8 binary（如 <<"deepseek-v4-flash"/utf8>>），勿用双引号列表。

%% LLM 提供商标识（openai | deepseek | anthropic | qwen | kimi | zhipu | …）
{provider, deepseek}.
%% API 密钥（必填才能调用模型）
{api_key, <<"your-api-key-here"/utf8>>}.
%% API 基址；留空则使用该 provider 预设 URL
{base_url, <<"https://api.deepseek.com"/utf8>>}.
%% 默认模型名
{model, <<"deepseek-v4-flash"/utf8>>}.

%%-----------------------------------------------------------------------------
%% Agent 行为
%%-----------------------------------------------------------------------------

%% 项目根目录（工具读写的沙箱基准路径）
{projectRoot, <<"."/utf8>>}.
%% 单次 ask 最多推理步数（LLM ↔ 工具 往返轮次）
{maxSteps, 25}.
%% 会话历史保留的最大消息条数（不含 system）
{maxMessages, 40}.
%% 上下文 token 预算上限（超出则裁剪历史）
{maxTokens, 32000}.
%% 传给 LLM 的额外选项，如 [{temperature, 0.2}, {max_tokens, 4096}]
{modelOptions, [{temperature, 0.2}]}.
%% 工具权限策略（与 mode 共同生效）
{policy, [
    {allowRead, true},              %% 允许只读工具（readFile、codeIndex 等）
    {allowExecuteSafe, true},       %% 允许安全执行类工具（nodeInfo、compileLoad 等）
    {allowExecuteRisky, false},     %% 允许高风险执行（callFunction 等）
    {allowWrite, false},            %% 允许写文件/补丁
    {requireWriteConfirmation, true},  %% 写操作需用户 approve
    {requireRiskyConfirmation, true}   %% 高风险操作需用户 approve
]}.
%% 默认运行模式：ask（只读）| edit（可改文件）| exec（可执行）
{mode, ask}.
%% edit 模式下修改文件前是否自动备份到 .al/backups
{backupBeforeEdit, true}.
%% callFunction 额外黑名单 MFA（与 alToolEval 内置黑名单合并）
{execBlacklist, []}.
%% callFunction / 工具执行默认超时（毫秒）
{execTimeout, 60000}.
%% LLM HTTP 瞬时失败（429/5xx/超时）最大重试次数（指数退避）
{llmMaxRetries, 2}.
%% 代码索引/递归列举时额外排除的目录片段（叠加内置 _build/.git/.al）
{indexExclude, []}.
%% 追加到系统提示词末尾的自定义文本；留空不追加
{systemPromptExtra, <<>>}.
%% 历史超出 maxMessages 时，裁剪段压缩为摘要 system 消息而非直接丢弃
{historyCompaction, true}.

%%-----------------------------------------------------------------------------
%% 代码语义检索（RAG）
%%-----------------------------------------------------------------------------

%% RAG 检索模式：auto（embedding 可用则用 hybrid，否则 tfidf）| tfidf | hybrid
{ragMode, auto}.
%% 向量嵌入模型名；留空则按 provider 取默认（如 OpenAI 的 text-embedding-3-small）
{embeddingModel, <<>>}.

%%-----------------------------------------------------------------------------
%% Web 服务
%%-----------------------------------------------------------------------------

%% HTTP 监听端口
{webPort, 8088}.
%% 是否随应用启动 Web 服务（ali_app 读取）
{webEnabled, false}.
%% Web API Bearer 令牌；留空=不启用认证（写操作默认仅允许本地回环）
{webApiToken, <<>>}.
%% CORS 放行来源：<<>> | <<"*"/utf8>> | <<"http://localhost:3000"/utf8>> | [<<"http://a"/utf8>>, <<"http://b"/utf8>>]
{webAllowOrigin, <<>>}.
%% 每 IP 在速率窗口内最大请求数（0=关闭限速）
{webRateLimit, 240}.
%% 速率窗口长度（毫秒）
{webRateWindowMs, 60000}.
%% 未配置 webApiToken 时，是否允许非本机 IP 执行写 API
{webAllowRemoteWrites, false}.

%%-----------------------------------------------------------------------------
%% 运行时限制 limits
%% 未列出的键使用 include/al_limits.hrl 默认值；每项含义见该文件注释。
%% Web 附件相关项会经 GET / 与 /api/status → config 同步到前端。
%%-----------------------------------------------------------------------------
{limits, [
    %% --- Web 问答附件（alAttachments 校验；前端同步） ---
    {webMaxImages, 16},             %% 单次请求最多图片张数
    {webMaxFiles, 10},              %% 单次请求最多文本文件个数
    {webMaxImageBytes, 20971520},   %% 单张图片体积上限（字节，默认 20 MiB）
    {webMaxFileBytes, 5242880},     %% 单个文本附件体积上限（字节，默认 5 MiB）
    {webMaxDocuments, 4},           %% 单次请求最多 PDF 等文档个数
    {webMaxDocumentBytes, 10485760}, %% 单个 PDF 体积上限（字节，默认 10 MiB）
    %% --- readFile / listFiles / 代码分析 ---
    {toolReadFileMaxBytes, 262144},     %% readFile 默认读盘上限（256 KiB）；args.maxBytes 可覆盖
    {toolListFilesMaxResults, 50},      %% listFiles 默认返回条数上限
    {analyzeReadMaxBytes, 262144},      %% getFunctionSource 等读源文件体积上限
    {analyzeMaxSourceLines, 200},       %% getFunctionSource 最大行数
    {analyzeMaxAbstract, 12000},        %% getBeamAbstract 等格式化输出上限
    %% --- 工具 stdout/结果截断 ---
    {toolMaxOutput, 12000},             %% git/svn/eunit/ct 等 shell 输出截断
    {toolEvalMaxOutput, 8192},          %% callFunction 返回值预览截断
    {toolRuntimeMaxOutput, 8192},       %% runtimeSummary 等运行时工具输出截断
    {maxToolContent, 8000},             %% 工具结果写入 LLM 上下文前 JSON 截断
    %% --- OTP 监督树 getSupTree ---
    {otpMaxDepth, 6},                   %% 监督树最大递归深度
    {otpMaxChildren, 50},               %% 单节点最多展示子进程数
    %% --- 内存表容量 ---
    {auditMaxEntries, 500},             %% 审计日志 ETS 最大条数
    {progressMaxEvents, 500},           %% 单次 ask 进度事件最大条数
    {backupMaxPerFile, 50},             %% 每个源文件最多保留备份份数
    %% --- 外部命令 git/svn ---
    {shellCmdMaxOutput, 12000},         %% git/svn 命令 stdout 截断
    {shellCmdTimeout, 30000},           %% git/svn 命令超时（毫秒）
    %% --- 工具执行 ---
    {toolTimeout, 60000},               %% callFunction / 自定义工具默认超时（毫秒）
    {symlinkMaxDepth, 20}               %% readFile/listFiles 解析符号链接最大深度
]}.

%%-----------------------------------------------------------------------------
%% MCP（Model Context Protocol）
%% 连接后自动注册外部工具；ali:mcpConnectAll/0 或 ali:mcpConnect/1 触发。
%%
%% stdio 传输字段：name, command, args, env, level
%% http  传输字段：name, transport=>http, url, headers, level
%% level：read | executeSafe | executeRisky | write
%%-----------------------------------------------------------------------------
{mcpServers, []}.
